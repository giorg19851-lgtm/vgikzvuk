<!doctype html>
<html lang="ru">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#efede6"><meta name="apple-mobile-web-app-capable" content="yes">
<title>ВГИК тест v14</title>
<link rel="manifest" href="manifest.json?v=14"><link rel="stylesheet" href="style.css?v=14">
</head>
<body>
<main class="screen"><section class="card"><div class="ink-lines"></div>
<div class="top"><button id="menuBtn" class="icon-btn">☰</button><div id="meta" class="meta">загрузка</div></div>
<div id="question" class="question">Загрузка теста...</div><div id="options" class="options"></div>
<div id="result" class="result hidden"><div id="resultMark" class="result-mark"></div><div id="correctAnswer" class="correct-answer"></div><div id="explanation" class="explanation"></div></div>
<button id="nextBtn" class="next hidden">Дальше</button><div class="bottom"><span id="stats">0 / 0</span></div>
<aside id="drawer" class="drawer hidden"><div class="drawer-box"><button id="closeDrawer" class="icon-btn close">×</button>
<div class="section-title">Тема</div><div id="themeButtons" class="theme-buttons">
<button data-theme="all">Все</button>
<button data-theme="physics">Физика</button>
<button data-theme="creativeFolder">Творческая папка</button>
<button data-theme="sovietCinema">Кино СССР/РФ</button>
<button data-theme="frenchCinema">Кино Франция</button>
<button data-theme="sound">Звукорежиссура</button>
<button data-theme="directors">Режиссёры</button>
<button data-theme="philosophy">Философия кино</button>
</div>
<label class="check"><input id="onlyWrong" type="checkbox"> только ошибки в этой теме</label>
<label class="check"><input id="hardMode" type="checkbox"> чаще сложные</label>
<button id="resetBtn" class="reset">сбросить прогресс</button>
</div></aside></section></main>
<script src="db.js?v=14"></script><script src="app.js?v=14"></script>
</body></html>
