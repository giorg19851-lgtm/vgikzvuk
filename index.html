<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#efede6">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ВГИК тест">
  <title>ВГИК тест</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="screen">
    <section class="card">
      <div class="ink-lines" aria-hidden="true"></div>

      <div class="top">
        <button id="menuBtn" class="icon-btn" aria-label="Настройки">☰</button>
        <div id="meta" class="meta">000</div>
      </div>

      <div id="question" class="question">Загрузка теста...</div>

      <div id="options" class="options"></div>

      <div id="result" class="result hidden">
        <div id="resultMark" class="result-mark"></div>
        <div id="correctAnswer" class="correct-answer"></div>
        <div id="explanation" class="explanation"></div>
      </div>

      <button id="nextBtn" class="next hidden">Дальше</button>

      <div class="bottom">
        <span id="stats">0 / 0</span>
      </div>

      <aside id="drawer" class="drawer hidden">
        <div class="drawer-box">
          <button id="closeDrawer" class="icon-btn close">×</button>
          <h2>Настройки</h2>

          <label>
            <input id="onlyWrong" type="checkbox">
            только ошибки
          </label>

          <label>
            <input id="hardMode" type="checkbox">
            чаще сложные
          </label>

          <button id="resetBtn" class="reset">сбросить прогресс</button>
        </div>
      </aside>
    </section>
  </main>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
