<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#e7e1d3">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="ВГИК тренер">
  <title>ВГИК тренер | Звукорежиссура</title>
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main id="app" class="app">
    <section class="trainer-card" aria-live="polite">
      <div class="ornament top-left" aria-hidden="true">𝄞</div>
      <div class="ornament top-right" aria-hidden="true">𝄢</div>

      <header class="card-head">
        <div>
          <div class="eyebrow">ВГИК • звукорежиссура</div>
          <h1 id="topicTitle">Тренер</h1>
        </div>
        <button id="menuBtn" class="ghost-btn tiny" title="Настройки">☰</button>
      </header>

      <div class="meta-row">
        <span id="counter">0</span>
        <span id="difficulty">сложность</span>
        <span id="modeName">режим</span>
      </div>

      <article class="question-box">
        <div id="questionText" class="question-text">Загрузка базы...</div>
        <div id="choices" class="choices"></div>

        <textarea id="freeAnswer" class="free-answer" placeholder="Ответь кратко здесь или проговори вслух. Потом нажми «Показать ответ»." rows="4"></textarea>

        <div id="answerPanel" class="answer-panel hidden">
          <div class="answer-label">Правильный ответ</div>
          <div id="answerText" class="answer-text"></div>
          <div id="explanationText" class="explanation-text"></div>
        </div>
      </article>

      <footer class="actions">
        <button id="showAnswerBtn" class="main-btn">Показать ответ</button>
        <button id="correctBtn" class="main-btn success hidden">Верно</button>
        <button id="wrongBtn" class="main-btn danger hidden">Неверно</button>
        <button id="nextBtn" class="main-btn hidden">Дальше</button>
      </footer>

      <div class="bottom-line">
        <span id="stats">правильно 0 • ошибки 0 • серия 0</span>
      </div>

      <aside id="drawer" class="drawer hidden">
        <div class="drawer-card">
          <button id="closeDrawer" class="ghost-btn close">×</button>
          <h2>Настройки</h2>
          <label class="toggle">
            <input type="checkbox" id="onlyWrong">
            <span>Гонять только ошибки</span>
          </label>
          <label class="toggle">
            <input type="checkbox" id="hardMode">
            <span>Чаще сложные вопросы</span>
          </label>
          <button id="resetProgress" class="ghost-btn danger-outline">Сбросить прогресс</button>
          <p class="small-note">
            Порядок вопросов случайный, но связанный по теме и тегам. Ошибка возвращается через 5–10 вопросов.
          </p>
        </div>
      </aside>
    </section>
  </main>

  <script src="db.js"></script>
  <script src="app.js"></script>
</body>
</html>
